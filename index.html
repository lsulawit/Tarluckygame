<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lucky Love Tar</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: "Prompt", sans-serif;
      background: linear-gradient(135deg, #ffd6e8, #fff0f7);
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .card {
      background: white;
      padding: 30px 22px;
      border-radius: 28px;
      box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3);
      width: 85%;
      max-width: 360px;
      position: relative;
      z-index: 2;
    }

    h1 {
      color: #ff4f9a;
      font-size: 30px;
      margin-bottom: 10px;
    }

    p {
      color: #555;
      font-size: 18px;
    }

    .heart {
      font-size: 55px;
      animation: beat 1s infinite;
    }

    @keyframes beat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.18); }
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 14px 24px;
      font-size: 18px;
      margin: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    #yesBtn {
      background: #ff5ca8;
      color: white;
      box-shadow: 0 5px 15px rgba(255, 92, 168, 0.4);
    }

    #noBtn {
      background: #f1f1f1;
      color: #666;
      position: relative;
    }

    #message {
      margin-top: 18px;
      font-size: 20px;
      color: #ff4f9a;
      font-weight: bold;
      display: none;
    }

    .falling-heart {
      position: fixed;
      top: -20px;
      color: #ff5ca8;
      font-size: 22px;
      animation: fall linear forwards;
      z-index: 1;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="heart">💖</div>
    <h1>Lucky Love Tar</h1>
    <p>Tar รัก Lucky ไหม?</p>

    <button id="yesBtn">รักมากที่สุด 💕</button>
    <button id="noBtn">ไม่รัก 😝</button>

    <div id="message">
      เย้! Lucky ก็รัก Tar มากที่สุดในโลกเหมือนกัน 💖
    </div>
  </div>

  <script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const message = document.getElementById("message");

    noBtn.addEventListener("mouseover", moveNoButton);
    noBtn.addEventListener("click", moveNoButton);

    function moveNoButton() {
      const x = Math.random() * (window.innerWidth - 120);
      const y = Math.random() * (window.innerHeight - 60);
      noBtn.style.position = "fixed";
      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    }

    yesBtn.addEventListener("click", () => {
      message.style.display = "block";
      yesBtn.innerText = "รักกันตลอดไป 💍";
      createManyHearts();
    });

    function createHeart() {
      const heart = document.createElement("div");
      heart.className = "falling-heart";
      heart.innerText = "💗";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = Math.random() * 2 + 3 + "s";
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 5000);
    }

    function createManyHearts() {
      for (let i = 0; i < 35; i++) {
        setTimeout(createHeart, i * 80);
      }
    }

    setInterval(createHeart, 700);
  </script>

</body>
</html>
