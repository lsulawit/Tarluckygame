<script>
let hearts = 100;
let selectedBet = 10;
let pinkBet = 0;
let blueBet = 0;
let timeLeft = 20;
let playing = false;
let timer = null;

const heartsEl = document.getElementById("hearts");
const timeEl = document.getElementById("time");
const selectedBetEl = document.getElementById("selectedBet");
const pinkBetEl = document.getElementById("pinkBet");
const blueBetEl = document.getElementById("blueBet");
const msgEl = document.getElementById("msg");
const timerFill = document.getElementById("timerFill");

function goGame(){
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("gameScreen").classList.remove("hidden");
}

function updateUI(){
  heartsEl.innerText = hearts;
  timeEl.innerText = timeLeft;
  selectedBetEl.innerText = selectedBet;
  pinkBetEl.innerText = pinkBet;
  blueBetEl.innerText = blueBet;
  timerFill.style.width = (timeLeft / 20 * 100) + "%";
}

function chooseBet(n){
  selectedBet = n;
  document.querySelectorAll(".bet-btn").forEach(b=>b.classList.remove("selected"));
  document.getElementById("b"+n).classList.add("selected");
  updateUI();
}

function startRound(){
  if(hearts <= 0){
    msg("หัวใจหมดแล้ว กด RESET เพื่อเริ่มใหม่ 💔");
    return;
  }

  clearInterval(timer);
  playing = true;
  pinkBet = 0;
  blueBet = 0;
  timeLeft = 20;

  document.getElementById("pinkCards").innerHTML = "";
  document.getElementById("blueCards").innerHTML = "";
  document.getElementById("pinkScore").innerText = "?";
  document.getElementById("blueScore").innerText = "?";
  document.getElementById("pinkTeam").classList.remove("selected","win-glow");
  document.getElementById("blueTeam").classList.remove("selected","win-glow");

  msg("เริ่มแล้ว! วางหัวใจฝั่งชมพูหรือฟ้า 💖");
  updateUI();

  timer = setInterval(()=>{
    timeLeft--;
    updateUI();

    if(timeLeft <= 5 && timeLeft > 0){
      msg("เหลือ " + timeLeft + " วิ รีบวางหัวใจเร็ว!");
    }

    if(timeLeft <= 0){
      clearInterval(timer);
      revealCards();
    }
  },1000);
}

function placeHeart(team){
  if(!playing){
    msg("กด START ROUND ก่อนนะ");
    return;
  }

  if(hearts < selectedBet){
    msg("หัวใจไม่พอ เลือกจำนวนที่น้อยลงนะ");
    return;
  }

  hearts -= selectedBet;

  if(team === "pink"){
    pinkBet += selectedBet;
    flashTeam("pinkTeam");
    msg("วางทีมชมพู +" + selectedBet + " 💗");
  }else{
    blueBet += selectedBet;
    flashTeam("blueTeam");
    msg("วางทีมฟ้า +" + selectedBet + " 💙");
  }

  popHeart();
  updateUI();
}

function drawCard(){
  const cards = [
    {v:"A",p:1},{v:"2",p:2},{v:"3",p:3},{v:"4",p:4},{v:"5",p:5},
    {v:"6",p:6},{v:"7",p:7},{v:"8",p:8},{v:"9",p:9},
    {v:"10",p:0},{v:"J",p:0},{v:"Q",p:0},{v:"K",p:0}
  ];
  return cards[Math.floor(Math.random()*cards.length)];
}

function revealCards(){
  playing = false;

  if(pinkBet === 0 && blueBet === 0){
    msg("รอบนี้ยังไม่ได้วางหัวใจ เลยไม่มีผลนะ 💖");
    return;
  }

  msg("หมดเวลา! เปิดไพ่แล้ว...");

  const pink = [drawCard(), drawCard()];
  const blue = [drawCard(), drawCard()];

  const pinkScore = (pink[0].p + pink[1].p) % 10;
  const blueScore = (blue[0].p + blue[1].p) % 10;

  showCardSet("pinkCards", pink);
  showCardSet("blueCards", blue);

  setTimeout(()=>{
    document.getElementById("pinkScore").innerText = pinkScore;
    document.getElementById("blueScore").innerText = blueScore;

    let reward = 0;

    if(pinkScore > blueScore){
      reward = pinkBet * 2;
      hearts += reward;
      document.getElementById("pinkTeam").classList.add("win-glow");
      msg("ทีมชมพูชนะ! ได้คืน " + reward + " 💖 | กำไร +" + pinkBet);
      bigHeartRain();
    }
    else if(blueScore > pinkScore){
      reward = blueBet * 2;
      hearts += reward;
      document.getElementById("blueTeam").classList.add("win-glow");
      msg("ทีมฟ้าชนะ! ได้คืน " + reward + " 💙 | กำไร +" + blueBet);
      bigHeartRain();
    }
    else{
      reward = pinkBet + blueBet;
      hearts += reward;
      msg("เสมอ! คืนหัวใจทั้งหมด " + reward + " 💞");
      bigHeartRain();
    }

    updateUI();

    if(hearts <= 0){
      msg("หัวใจหมดแล้ว กด RESET เพื่อเริ่มใหม่ 💔");
    }
  },1400);
}

  const box = document.getElementById(id);
  box.innerHTML = "";

  cards.forEach((c,i)=>{
    setTimeout(()=>{
      const card = document.createElement("div");
      card.className
